<!-- sidebar.component.html -->
<aside class="sidebar" [class.collapsed]="!sidebarOpen">

  <!-- Logo Section -->
  <div class="logo-section">
    <div class="logo-wrapper">
      <div class="logo-icon-box">
        <img src="/assets/images/logo.png" alt="Forensic Logo" class="custom-logo">
      </div>
      <span class="logo-text" *ngIf="sidebarOpen">Forensic</span>
    </div>
  </div>

  <!-- Nav Menu -->
  <nav class="nav-menu">

    <!-- ============ DOCTOR LINKS ============ -->
    <ng-container *ngIf="!isAdmin">

      <a class="nav-item" title="Dashboard" routerLink="/dashboard" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">Dashboard</span>
      </a>

      <a class="nav-item" routerLink="/explore" routerLinkActive="active" title="Explore">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">Explore</span>
      </a>

      <a class="nav-item" routerLink="/community" routerLinkActive="active" title="Community">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">Community</span>
      </a>

      <a class="nav-item" title="Setting" routerLink="/settings" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">Setting</span>
      </a>

    </ng-container>

    <!-- ============ ADMIN LINKS ============ -->
    <ng-container *ngIf="isAdmin">

      <a class="nav-item" routerLink="/admin/dashboard" routerLinkActive="active" title="Dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">Dashboard</span>
      </a>

      <a class="nav-item" routerLink="/admin/doctors-hub" routerLinkActive="active" title="Doctors Hub">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">Doctors Hub</span>
      </a>

      <a class="nav-item" routerLink="/admin/case-audit" routerLinkActive="active" title="Case Audit">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">Case Audit</span>
      </a>

      <a class="nav-item" routerLink="/admin/system-logs" routerLinkActive="active" title="System Logs">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">System Logs</span>
      </a>

      <a class="nav-item" routerLink="/admin/community-moderation" routerLinkActive="active" title="Community">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">Community</span>
      </a>

      <a class="nav-item" routerLink="/admin/chatbot-management" routerLinkActive="active" title="Chatbot AI">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="10" rx="2"></rect>
          <circle cx="12" cy="5" r="2"></circle>
          <line x1="12" y1="7" x2="12" y2="11"></line>
        </svg>
        <span class="nav-text" *ngIf="sidebarOpen">Chatbot AI</span>
      </a>

    </ng-container>

  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <a class="nav-item logout" (click)="openLogoutModal()" title="Log out">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span class="nav-text" *ngIf="sidebarOpen">Logout</span>
    </a>
  </div>

  <!-- Toggle Button -->
  <button class="toggle-arrow" (click)="toggleSidebar()">
    <svg viewBox="0 0 24 24" [style.transform]="sidebarOpen ? 'rotate(0deg)' : 'rotate(180deg)'">
      <path d="M15 19l-7-7 7-7" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

</aside>

<div class="logout-modal" *ngIf="showLogoutModal">
  <div class="modal-box">
    <h3>Logout</h3>
    <p>Are you sure you want to log out?</p>
    <div class="modal-actions">
      <button class="cancel" (click)="cancelLogout()">Cancel</button>
      <button class="confirm" (click)="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
