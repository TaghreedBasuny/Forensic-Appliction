<div class="modal-overlay" *ngIf="isOpen" (click)="onOverlayClick($event)">
  <div class="modal-container">
    
    <!-- Header -->
    <div class="modal-header">
      <div class="header-content">
        <div class="icon-wrapper">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
            <path d="M12 4V20M4 12H20" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="header-text">
          <h2>Add New Case</h2>
          <p>Create a new forensic investigation case</p>
        </div>
      </div>
      <button class="close-btn" (click)="closeModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Form Content -->
    <div class="modal-content">
      <form (ngSubmit)="createCase()">
        
        <!-- Case Title -->
        <div class="form-group">
          <label class="form-label">Case Title <span class="required">*</span></label>
          <input 
            type="text" 
            class="form-input"
            [class.input-error]="errors.title"
            placeholder="e.g., Murder Investigation - Downtown"
            [(ngModel)]="caseData.title"
            name="title" 
            (input)="errors.title = false"
          >
          <span *ngIf="errors.title" class="error-message">Case Title is required</span>
        </div>

        <!-- Case Description -->
        <div class="form-group">
          <label class="form-label">Case Description <span class="required">*</span></label>
          <textarea 
            class="form-textarea"
            [class.input-error]="errors.description"
            placeholder="Provide detailed information about the case..."
            rows="5"
            [(ngModel)]="caseData.description"
            name="description"
            (input)="errors.description = false"
          ></textarea>
          <span *ngIf="errors.description" class="error-message">Case Description is required</span>
        </div>

        <!-- Security Notice -->
        <div class="security-notice">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <path d="M12 16V12M12 8H12.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>All case information will be securely stored and can be accessed by authorized personnel only.</span>
        </div>

      </form>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeModal()" [disabled]="isLoading">
        Cancel
      </button>
      <button class="btn-create" (click)="createCase()" [disabled]="isLoading">
        <svg *ngIf="!isLoading" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 4V20M4 12H20" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div *ngIf="isLoading" class="spinner-small"></div>
        {{ isLoading ? 'Creating...' : 'Create Case' }}
      </button>
    </div>

  </div>
</div>
