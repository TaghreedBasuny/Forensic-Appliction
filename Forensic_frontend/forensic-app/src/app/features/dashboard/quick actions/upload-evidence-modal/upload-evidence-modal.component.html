<div class="modal-overlay" *ngIf="isOpen" (click)="onOverlayClick($event)">
  <div class="modal-container">
    
    <!-- Header -->
    <div class="modal-header">
      <div class="header-content">
        <div class="icon-wrapper">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M3 7V19C3 19.5304 3.21071 20.0391 3.58579 20.4142C3.96086 20.7893 4.46957 21 5 21H19C19.5304 21 20.0391 20.7893 20.4142 20.4142C20.7893 20.0391 21 19.5304 21 19V9C21 8.46957 20.7893 7.96086 20.4142 7.58579C20.0391 7.21071 19.5304 7 19 7H13L11 5H5C4.46957 5 3.96086 5.21071 3.58579 5.58579C3.21071 5.96086 3 6.46957 3 7Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="header-text">
          <h2>Upload Evidence</h2>
          <p>Upload forensic evidence files to the system</p>
        </div>
      </div>
      <button class="close-btn" (click)="closeModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="modal-content">
      
      <!-- Error Message -->
      <div *ngIf="errorMsg" class="error-alert">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M12 8V12M12 16H12.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        {{errorMsg}}
      </div>

      <!-- Drag & Drop Zone -->
      <!-- Drag & Drop Zone - Same Design as Analysis Models -->
<div class="upload-cards-grid">
  
  <!-- Main Upload Card -->
  <div 
    class="upload-card"
    [class.dragging]="isDragging"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="triggerFileInput()"
  >
    <input type="file" id="fileInput" hidden (change)="onFileSelected($event)">
    
    <div *ngIf="!selectedFile" class="card-content">
    
      <div class="text-content">
        <h3 class="card-title">Drag & Drop or Click to Upload</h3>
        <p class="card-description">Upload forensic evidence files to the system</p>
      </div>
    </div>

    <div *ngIf="selectedFile" class="card-content file-selected">
      <div class="file-icon-wrapper" [ngClass]="'icon-' + getFileIcon()">
        <svg *ngIf="getFileIcon() === 'image'" width="32" height="32" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
          <path d="M21 15L16 10L5 21" stroke="currentColor" stroke-width="2"/>
        </svg>
        <svg *ngIf="getFileIcon() === 'video'" width="32" height="32" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M10 9L15 12L10 15V9Z" fill="currentColor"/>
        </svg>
        <svg *ngIf="getFileIcon() === 'document'" width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="currentColor" stroke-width="2"/>
        </svg>
        <svg *ngIf="getFileIcon() === 'file'" width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
      <div class="file-details">
        <h4 class="file-name">{{selectedFile.name}}</h4>
        <p class="file-size">{{formatFileSize(selectedFile.size)}}</p>
      </div>
      <button class="remove-btn" (click)="removeFile($event)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <button *ngIf="!selectedFile" class="launch-btn" type="button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="17 8 12 3 7 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="12" y1="3" x2="12" y2="15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Upload
    </button>
  </div>

</div>
      <!-- Form Fields -->
      <form (ngSubmit)="uploadEvidence()">
        
        <!-- Evidence Name -->
        <div class="form-group">
          <label class="form-label">Evidence Name <span class="required">*</span></label>
          <input 
            type="text" 
            class="form-input"
            placeholder="e.g., Murder Investigation - Downtown"
            [(ngModel)]="formData.evidenceName"
            name="evidenceName"
            [disabled]="isLoading"
          >
        </div>

        <!-- Link to Case & Evidence Type -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Link to Case <span class="optional">(Optional)</span></label>
            <input 
              type="date" 
              class="form-input"
              [(ngModel)]="formData.linkToCase"
              name="linkToCase"
              [disabled]="isLoading"
            >
          </div>

          <div class="form-group">
            <label class="form-label">Evidence Type <span class="required">*</span></label>
            <select 
              class="form-select"
              [(ngModel)]="formData.evidenceType"
              name="evidenceType"
              [disabled]="isLoading"
            >
              <option *ngFor="let type of evidenceTypes" [value]="type">{{type}}</option>
            </select>
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label class="form-label">Description <span class="required">*</span></label>
          <textarea 
            class="form-textarea"
            placeholder="Enter evidence description..."
            rows="3"
            [(ngModel)]="formData.description"
            name="description"
            [disabled]="isLoading"
          ></textarea>
        </div>

      </form>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeModal()" [disabled]="isLoading">
        Cancel
      </button>
      <button class="btn-upload" (click)="uploadEvidence()" [disabled]="isLoading">
        <svg *ngIf="!isLoading" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="17 8 12 3 7 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="3" x2="12" y2="15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div *ngIf="isLoading" class="spinner-small"></div>
        {{isLoading ? 'Uploading...' : 'Upload Evidence'}}
      </button>
    </div>

  </div>
</div>
