<div class="modal-overlay" *ngIf="isOpen" (click)="onOverlayClick($event)">
  <div class="modal-container">
    
    <div class="modal-header purple">
      <div class="header-content">
        <div class="header-icon">
          <img src="/assets/images/Frame 1000001591 (1).png" alt="evidence">
        </div>
        <div class="header-text">
          <h2>Evidence Items</h2>
          <p>{{ items.length }} total items</p>
        </div>
      </div>
      <button class="close-btn" (click)="closeModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="modal-content">
      <div class="evidence-grid">
<div class="evidence-card" *ngFor="let item of items" 
     (click)="goToCase(item.case_id)" 
     style="cursor: pointer;">          
          <div class="card-left">
            <div class="card-info">
              <h3 class="card-title">{{ item.name }}</h3>
              <span class="card-type">{{ item.model_used }}</span>
              <div class="card-meta">
                <span class="card-case-id">{{ item.use_case?.name }}</span>
                <span class="card-date">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                    <path d="M16 2V6M8 2V6M3 10H21" stroke="currentColor" stroke-width="2"/>
                  </svg>
                  {{ item.created_at | date: 'yyyy-MM-dd' }}
                </span>
              </div>
            </div>
          </div>

        </div>

        <div *ngIf="items.length === 0" class="empty-state">
          <p>No evidence items found.</p>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <div class="footer-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M12 16V12M12 8H12.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Showing {{ items.length }} evidence items
      </div>
      <button class="close-modal-btn" (click)="closeModal()">Close</button>
    </div>

  </div>
</div>
