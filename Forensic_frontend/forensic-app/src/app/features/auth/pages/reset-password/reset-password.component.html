<div class="login-container">
  <a class="top-logo" routerLink="/home">
    <img src="/assets/images/logo.png" alt="Forensic Logo" />
  </a>

  <div class="login-card">
    <div class="icon-circle">
      <i class="fas fa-key"></i>
    </div>
    
    <h2>Create New Password</h2>
    <p class="subtitle">
      Your new password must be different from previous used passwords.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <!-- حقل كلمة المرور الجديدة -->
      <div class="form-group">
        <span class="icon left"><i class="fas fa-lock"></i></span>
        
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="newPassword"
          placeholder="New Password"
        />
        
        <!-- أيقونة العين تظهر فقط إذا كان هناك نص في الحقل -->
        <span *ngIf="form.get('newPassword')?.value" class="icon right" (click)="togglePasswordVisibility()">
          <i class="fas" [ngClass]="{'fa-eye': !showPassword, 'fa-eye-slash': showPassword}"></i>
        </span>
        
        <!-- رسالة الخطأ: محجوزة المساحة، تظهر فقط عند الخطأ -->
        <div 
          class="field-error" 
          [class.visible]="form.get('newPassword')?.touched && form.get('newPassword')?.hasError('minlength')"
        >
          <i class="fas fa-exclamation-circle"></i> At least 8 characters.
        </div>
      </div>

      <!-- حقل تأكيد كلمة المرور -->
      <div class="form-group">
        <span class="icon left"><i class="fas fa-lock"></i></span>
        
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="Confirm Password"
        />

        <!-- أيقونة العين تظهر فقط إذا كان هناك نص في الحقل -->
        <span *ngIf="form.get('confirmPassword')?.value" class="icon right" (click)="toggleConfirmPasswordVisibility()">
          <i class="fas" [ngClass]="{'fa-eye': !showConfirmPassword, 'fa-eye-slash': showConfirmPassword}"></i>
        </span>

        <!-- رسالة الخطأ: محجوزة المساحة، تظهر فقط عند الخطأ -->
        <div 
          class="field-error" 
          [class.visible]="form.hasError('mismatch') && form.get('confirmPassword')?.touched"
        >
          <i class="fas fa-times-circle"></i> Passwords do not match.
        </div>
      </div>
      
      <button
        class="btn-login"
        type="submit"
        [disabled]="isSubmitDisabled"
      >
        <div *ngIf="isLoading" class="spinner"></div>
        <span>{{ isLoading ? 'Resetting...' : 'Reset Password' }}</span>
      </button>
    </form>
  </div>
</div>
