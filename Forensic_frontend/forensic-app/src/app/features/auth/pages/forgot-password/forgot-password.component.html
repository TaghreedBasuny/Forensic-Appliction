<div class="login-container">
  <a class="top-logo" routerLink="/home">
    <img src="/assets/images/logo.png" alt="Forensic Logo" />
  </a>

  <div class="login-card">
    <div class="icon-circle">
      <i class="fas fa-lock"></i> 
    </div>
    
    <h2>Reset Password</h2>
    <p class="subtitle">Provide your email to receive a password reset link.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <span class="icon left"><i class="fas fa-envelope"></i></span>
        <input
          type="email"
          formControlName="email"
          placeholder="Your Work Email"
        />
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button
        class="btn-login"
        type="submit" 
        [disabled]="isLoading"
      >
        <div *ngIf="isLoading" class="spinner"></div>
        <span>{{ isLoading ? 'Sending...' : 'Send Email' }}</span>
      </button>
    </form>

    <div class="back-link">
      <a routerLink="/auth/login">← Back to Login</a>
    </div>
  </div>
</div>
